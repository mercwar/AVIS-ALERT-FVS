<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>AVIS FVS :: CYBORG ALERT :: PROTOCOL CONSOLE</title>

    <!-- ROBO-KNIGHT 3D STYLE PACK -->
    <link rel="stylesheet" href="rk3d.css">
</head>

<body>

<!-- ==========================================================
     AVIS.FVS-CYBORG ARTIFACT
     PROTOCOL CONSOLE :: HEAVY MODE
========================================================== -->

<h1>AVIS FVS :: CYBORG ALERT :: PROTOCOL CONSOLE</h1>

<!-- PROTOCOL MANIFEST -->
<div id="manifest" style="
    margin-bottom:20px;
    padding:12px;
    border:2px solid #00e0ff;
    border-radius:6px;
    background:rgba(0,20,30,0.45);
    box-shadow:0 0 12px #00e0ff55, inset 0 0 12px #003040;
">
    <strong>PROTOCOL MANIFEST</strong><br>
    • AVIS.FVS-CYBORG ARTIFACT<br>
    • MODULE CLASS: ALERT / TERMINAL ROUTER<br>
    • VERSION: AUTO-DETECT VIA EXPORT MODULE<br>
    • STATUS: ONLINE<br>
    • AUTHORITY: CVBGOD / ROBO-KNIGHT UNIVERSE<br>
</div>

<!-- COMMAND GRID -->
<div style="margin-bottom:10px;">
    <button onclick="cmdSystem()">SYSTEM MODE</button>
    <button onclick="cmdTest()">TEST MODE</button>
    <button onclick="cmdAlert()">ALERT MODE</button>
    <button onclick="cmdTerminal()">TERMINAL PING</button>
    <button onclick="cmdNull()">NULL</button>
</div>

<!-- CUSTOM COMMAND -->
<div style="margin-bottom:10px;">
    <input id="customText" type="text" placeholder="Enter custom alert text">
    <button onclick="cmdCustom()">SEND CUSTOM</button>
</div>

<!-- TERMINAL OUTPUT -->
<div id="log"></div>

<!-- ==========================================================
     AVIS MODULE IMPORT + COMMAND ROUTER
========================================================== -->
<script type="module">

import { AVIS_ALERT } from "./AVIS_FVS_INI.js";

function log(msg) {
    document.getElementById("log").textContent += msg + "\n";
}

window.cmdSystem = () => {
    AVIS_ALERT(true, false, false, "SYSTEM MODE", true);
    log("[SYSTEM] AVIS SYSTEM MODE TRIGGERED");
};

window.cmdTest = () => {
    AVIS_ALERT(true, true, false, "TEST MODE", true);
    log("[TEST] AVIS TEST MODE TRIGGERED");
};

window.cmdAlert = () => {
    AVIS_ALERT(false, false, true, "ALERT MODE", true);
    log("[ALERT] AVIS ALERT MODE TRIGGERED");
};

window.cmdTerminal = () => {
    AVIS_ALERT(false, false, false, "TERMINAL PING", true);
    log("[TERM] TERMINAL PING SENT");
};

window.cmdNull = () => {
    AVIS_ALERT(false, false, false, "", true);
    log("[NULL] EMPTY PAYLOAD SENT");
};

window.cmdCustom = () => {
    let txt = document.getElementById("customText").value;
    AVIS_ALERT(false, false, true, txt, true);
    log("[CUSTOM] " + txt);
};

</script>

</body>
</html>
